<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to top, #ffdde1, #ee9ca7);
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* Rose */
.rose {
    width: 200px;
    cursor: pointer;
    transition: transform 0.3s;
    animation: float 3s ease-in-out infinite;
}

.rose:hover {
    transform: scale(1.1);
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0); }
}

/* Message */
.message {
    position: absolute;
    text-align: center;
    color: white;
    font-size: 40px;
    opacity: 0;
}

/* Sparkles */
.sparkle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    animation: sparkle 3s linear infinite;
}

@keyframes sparkle {
    from {
        transform: translateY(0);
        opacity: 1;
    }
    to {
        transform: translateY(-200px);
        opacity: 0;
    }
}
</style>
</head>

<body>

<!-- 🎵 Music -->
<audio id="music">
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b7cfd.mp3" type="audio/mpeg">
</audio>

<!-- 🌹 Rose -->
<img 
class="rose" 
id="rose"
src="https://pngimg.com/uploads/rose/rose_PNG659.png"
>

<!-- 💌 Message -->
<div class="message" id="message"></div>

<script>
const rose = document.getElementById("rose");
const message = document.getElementById("message");
const music = document.getElementById("music");

const text = "Happy Birthday Sukhi Pookie 🎀🌹\n(Sweetest person ever 🍓🤍)";

// 💌 Typing effect
function typeText() {
    let i = 0;
    message.style.opacity = 1;

    function typing() {
        if (i < text.length) {
            message.innerHTML += text.charAt(i) === "\n" ? "<br>" : text.charAt(i);
            i++;
            setTimeout(typing, 50);
        }
    }
    typing();
}

// ✨ Sparkles
function createSparkles() {
    for (let i = 0; i < 30; i++) {
        let s = document.createElement("div");
        s.classList.add("sparkle");
        s.style.left = Math.random() * window.innerWidth + "px";
        s.style.top = window.innerHeight + "px";
        s.style.animationDuration = (2 + Math.random()*3) + "s";
        document.body.appendChild(s);

        setTimeout(() => s.remove(), 4000);
    }
}

// 🎉 Click event
rose.onclick = function() {
    rose.style.display = "none";
    music.play(); // works because user clicked
    typeText();
    createSparkles();
};
</script>

</body>
</html>
