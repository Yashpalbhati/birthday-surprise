\<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to top, #ffdde1, #ee9ca7);
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* Start Button */
.startBtn {
    position: absolute;
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 20px;
    background: white;
    cursor: pointer;
    z-index: 10;
}

/* Rose */
.rose {
    width: 200px;
    cursor: pointer;
    display: none;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0); }
}

/* Message */
.message {
    position: absolute;
    text-align: center;
    color: white;
    font-size: 40px;
    opacity: 0;
}

/* Sparkles */
.sparkle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    animation: sparkle 3s linear infinite;
}

@keyframes sparkle {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-200px); opacity: 0; }
}
</style>
</head>

<body>

<!-- 🎵 LOCAL MUSIC -->
<audio id="music" preload="auto">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- 🔥 START BUTTON (important for sound) -->
<button class="startBtn" id="startBtn">Tap to Start 💖</button>

<!-- 🌹 Rose -->
<img 
class="rose" 
id="rose"
src="https://pngimg.com/uploads/rose/rose_PNG659.png"
>

<!-- 💌 Message -->
<div class="message" id="message"></div>

<script>
const startBtn = document.getElementById("startBtn");
const rose = document.getElementById("rose");
const message = document.getElementById("message");
const music = document.getElementById("music");

const text = "Happy Birthday Sukhi Pookie 🎀🌹\n(Sweetest person ever 🍓🤍)";

// 💖 START (fixes music issue 100%)
startBtn.onclick = function() {
    startBtn.style.display = "none";
    rose.style.display = "block";

    music.volume = 1;
    music.currentTime = 0;

    music.play().then(()=>{
        console.log("Music started 🎵");
    }).catch(()=>{
        alert("Tap again to enable music 🎵");
    });
};

// 💌 Typing effect
function typeText() {
    let i = 0;
    message.style.opacity = 1;

    function typing() {
        if (i < text.length) {
            message.innerHTML += text.charAt(i) === "\n" ? "<br>" : text.charAt(i);
            i++;
            setTimeout(typing, 50);
        }
    }
    typing();
}

// ✨ Sparkles
function createSparkles() {
    for (let i = 0; i < 40; i++) {
        let s = document.createElement("div");
        s.classList.add("sparkle");
        s.style.left = Math.random() * window.innerWidth + "px";
        s.style.top = window.innerHeight + "px";
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 4000);
    }
}

// 🌹 Click rose
rose.onclick = function() {
    rose.style.display = "none";
    typeText();
    createSparkles();
};
</script>

</body>
</html>
