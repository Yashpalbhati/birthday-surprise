<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to top, #ffc0cb, #ff9a9e);
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* Glow */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(255,255,255,0.3), transparent);
}

/* Flower */
.flower {
    font-size: 80px;
    cursor: pointer;
    transition: transform 0.3s, filter 0.3s;
    z-index: 2;
}
.flower:hover {
    transform: scale(1.2);
    filter: drop-shadow(0 0 10px #fff);
}

/* Message */
.message {
    position: absolute;
    text-align: center;
    display: none;
    animation: fadeIn 1.5s ease-in-out;
    z-index: 2;
}

.message h1 {
    font-size: 40px;
    color: #ff4081;
    text-shadow: 0 0 10px #fff, 0 0 20px #ff80ab;
}

.ribbon {
    font-size: 50px;
    margin: 10px 0;
    animation: bounce 1s infinite alternate;
}

.message p {
    font-size: 20px;
    color: #444;
}

/* Hearts */
.heart {
    position: absolute;
    color: white;
    font-size: 20px;
    animation: floatUp 5s linear;
    opacity: 0.7;
}

/* Animations */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

@keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-10px); }
}

@keyframes floatUp {
    from {
        transform: translateY(100vh);
        opacity: 0;
    }
    to {
        transform: translateY(-10vh);
        opacity: 1;
    }
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="birthday.mp3" type="audio/mpeg">
</audio>

<!-- Flower -->
<div class="flower" onclick="showMessage()">🌸</div>

<!-- Message -->
<div class="message" id="msg">
    <h1>🎉 Happy Birthday Sukhi Pookie 🎂</h1>
    <div class="ribbon">🎀</div>
    <p id="typing"></p>
</div>

<script>

/* Typing Effect */
const text = "May your day be as sweet and lovely as you 💖✨";
let i = 0;

function typeEffect() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 50);
    }
}

/* Confetti */
function createConfetti() {
    for (let i = 0; i < 40; i++) {
        let confetti = document.createElement("div");
        confetti.innerHTML = "🎉";
        confetti.style.position = "absolute";
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.top = Math.random() * 100 + "vh";
        confetti.style.fontSize = "20px";
        confetti.style.animation = "floatUp 3s linear";
        document.body.appendChild(confetti);

        setTimeout(() => confetti.remove(), 3000);
    }
}

/* Floating Hearts */
setInterval(() => {
    let heart = document.createElement("div");
    heart.innerHTML = "💖";
    heart.classList.add("heart");
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}, 500);

/* Main Click */
function showMessage() {
    document.querySelector(".flower").style.display = "none";
    document.getElementById("msg").style.display = "block";

    document.getElementById("music").play(); // play music
    createConfetti();
    typeEffect();
}

</script>

</body>
</html>
