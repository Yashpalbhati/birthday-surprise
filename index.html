<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For U! 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to top, #ffc0cb, #ff9a9e);
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* Soft glow overlay */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(255,255,255,0.3), transparent);
}

/* Flower */
.flower {
    font-size: 80px;
    cursor: pointer;
    transition: transform 0.3s, filter 0.3s;
    z-index: 2;
}

.flower:hover {
    transform: scale(1.2);
    filter: drop-shadow(0 0 10px #fff);
}

/* Message */
.message {
    position: absolute;
    text-align: center;
    display: none;
    animation: fadeIn 1.5s ease-in-out;
    z-index: 2;
}

.message h1 {
    font-size: 40px;
    color: #ff4081;
    margin-bottom: 10px;
}

/* Ribbon */
.ribbon {
    font-size: 50px;
    margin: 10px 0;
    animation: bounce 1s infinite alternate;
}

/* Text */
.message p {
    font-size: 20px;
    color: #444;
}

/* Floating hearts */
.heart {
    position: absolute;
    color: white;
    font-size: 20px;
    animation: floatUp 5s linear infinite;
    opacity: 0.7;
}

/* Animations */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

@keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-10px); }
}

@keyframes floatUp {
    from {
        transform: translateY(100vh);
        opacity: 0;
    }
    to {
        transform: translateY(-10vh);
        opacity: 1;
    }
}
</style>
</head>

<body>

<!-- Floating hearts -->
<div class="heart" style="left:10%">💖</div>
<div class="heart" style="left:30%">💗</div>
<div class="heart" style="left:50%">💞</div>
<div class="heart" style="left:70%">💕</div>
<div class="heart" style="left:90%">💓</div>

<!-- Flower -->
<div class="flower" onclick="showMessage()">🌸</div>

<!-- Message -->
<div class="message" id="msg">
    <h1>🎉 Happy Birthday Sukhi Pookie 🎂</h1>
    
    <div class="ribbon">🎀</div>
    
    <p>May your day be as sweet and lovely as you 💖✨</p>
</div>

<script>
function showMessage() {
    document.querySelector(".flower").style.display = "none";
    document.getElementById("msg").style.display = "block";
}
</script>

</body>
</html>
